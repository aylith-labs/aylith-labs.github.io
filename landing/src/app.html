<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/avatar-512.png" />
		<meta name="theme-color" content="#1c1a16" />
		<script>
			// Resolve theme and motion preferences before first paint so nothing flashes.
			(() => {
				try {
					const motionStored = localStorage.getItem('aylith:motion');
					const motionPref =
						motionStored === 'reduced' || motionStored === 'full' ? motionStored : 'system';
					const systemReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
					document.documentElement.dataset.motion =
						motionPref === 'system' ? (systemReduced ? 'reduced' : 'full') : motionPref;

					const themeStored = localStorage.getItem('theme');
					const themePref =
						themeStored === 'light' || themeStored === 'dark' ? themeStored : 'system';
					const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const isDark = themePref === 'dark' || (themePref === 'system' && systemDark);
					document.documentElement.classList.toggle('dark', isDark);
				} catch (error) {
					/* no-op: components apply preferences on mount */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
